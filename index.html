<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотогалерея Мероприятия</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Чтобы кнопки красиво переносились на узких экранах */
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #007aff; color: white; }
        #snap-btn { background-color: #ff3b30; color: white; display: none; }
        #switch-btn { background-color: #34c759; color: white; display: none; } /* Зеленая кнопка смены камеры */
        #status { margin-top: 15px; font-size: 14px; color: #a1a1a6; text-align: center; }
        canvas { display: none; }
        
        .btn-gallery {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 25px auto 10px auto;
            padding: 12px 20px;
            background-color: #ff5722;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }
        .btn-gallery:hover {
            background-color: #e64a19;
        }
    </style>
</head>
<body>

    <h1>Мгновенное фото Мероприятия</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Включить камеру</button>
        <button id="snap-btn">Сделать снимок</button>
        <button id="switch-btn">🔄 Сменить камеру</button> </div>

    <div id="status">Нажмите кнопку для запуска камеры</div>
    
    <a href="https://t.me/tattikunder" target="_blank" id="galleryBtn" class="btn-gallery">
        📸 Посмотреть все фото (Галерея)
    </a>

    <canvas id="canvas"></canvas>

    <script>
        const video     = document.getElementById('video');
        const canvas    = document.getElementById('canvas');
        const startBtn  = document.getElementById('start-btn');
        const snapBtn   = document.getElementById('snap-btn');
        const switchBtn = document.getElementById('switch-btn');
        const statusDiv = document.getElementById('status');

        let currentStream = null;
        let currentFacingMode = 'environment'; // По умолчанию задняя камера ('environment'). Фронтальная — 'user'
        let videoReady = false;

        // Ждём реального разрешения видео от браузера (критично для Safari/iOS)
        video.addEventListener('loadedmetadata', () => {
            videoReady = true;
        });

        // Функция остановки текущих стримов камеры (нужна при переключении)
        function stopCurrentStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            videoReady = false;
        }

        // Функция запуска камеры
        async function initCamera() {
            stopCurrentStream();
            statusDiv.textContent = "Запрос доступа к камере...";

            // На iOS Safari advanced constraints с width/height часто игнорируются или вызывают ошибку.
            // Используем только facingMode, чтобы браузер сам выбрал максимальное разрешение.
            const constraints = {
                video: {
                    facingMode: { ideal: currentFacingMode }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;

                // Ждём loadedmetadata чтобы videoWidth/videoHeight были корректными
                await new Promise((resolve) => {
                    if (video.readyState >= 1) { resolve(); return; }
                    video.addEventListener('loadedmetadata', resolve, { once: true });
                });

                videoReady = true;
                startBtn.style.display   = 'none';
                snapBtn.style.display    = 'inline-block'; // ИСПРАВЛЕНО: был snapBtn.style.style.display
                switchBtn.style.display  = 'inline-block';
                statusDiv.textContent    = `Камера включена (${currentFacingMode === 'environment' ? 'основная' : 'фронтальная'}, ${video.videoWidth}×${video.videoHeight}). Можно снимать!`;
            } catch (err) {
                console.error("Ошибка доступа к камере:", err);
                statusDiv.textContent = "Не удалось открыть камеру. Проверьте разрешения браузера.";
            }
        }

        // 1. Нажатие кнопки включения
        startBtn.addEventListener('click', initCamera);

        // КНОПКА СМЕНЫ КАМЕРЫ: меняет режим и перезапускает камеру
        switchBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            initCamera();
        });

        // 2. Создание снимка
        snapBtn.addEventListener('click', async () => {
            if (!videoReady) {
                statusDiv.textContent = "Камера ещё не готова, подождите секунду...";
                return;
            }

            snapBtn.disabled = true;
            statusDiv.textContent = "Делаем снимок...";

            const track = currentStream && currentStream.getVideoTracks()[0];

            // --- Метод 1: ImageCapture API (максимальное разрешение сенсора, Chrome/Android) ---
            if (track && typeof ImageCapture !== 'undefined') {
                try {
                    const imageCapture = new ImageCapture(track);
                    const blob = await imageCapture.takePhoto();
                    statusDiv.textContent = `Снимок готов: ${(blob.size / (1024*1024)).toFixed(2)} МБ`;
                    await uploadPhoto(blob);
                    snapBtn.disabled = false;
                    return;
                } catch (e) {
                    console.warn("ImageCapture не сработал, переходим к canvas:", e);
                }
            }

            // --- Метод 2: временный hi-res поток (фолбэк для Safari/iOS) ---
            // Safari показывает видео в низком разрешении. Запрашиваем новый поток
            // явно с высоким разрешением, рисуем кадр, сразу останавливаем.
            try {
                const hiResStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: currentFacingMode },
                        width:  { min: 1280, ideal: 4096 },
                        height: { min: 720,  ideal: 3072 }
                    },
                    audio: false
                });

                const hiResVideo = document.createElement('video');
                hiResVideo.srcObject = hiResStream;
                hiResVideo.muted = true;
                hiResVideo.playsInline = true;
                await hiResVideo.play();

                // Ждём реальных размеров (до 3 сек)
                await new Promise((resolve) => {
                    const timeout = setTimeout(resolve, 3000);
                    const check = () => {
                        if (hiResVideo.videoWidth > 480) { clearTimeout(timeout); resolve(); return; }
                        setTimeout(check, 100);
                    };
                    check();
                });

                const w = hiResVideo.videoWidth  || 1280;
                const h = hiResVideo.videoHeight || 720;
                canvas.width  = w;
                canvas.height = h;

                const ctx = canvas.getContext('2d');
                if (currentFacingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
                ctx.drawImage(hiResVideo, 0, 0, w, h);
                if (currentFacingMode === 'user') ctx.setTransform(1, 0, 0, 1, 0, 0);

                hiResStream.getTracks().forEach(t => t.stop());

                statusDiv.textContent = `Снимок ${w}×${h} — сжимаем...`;
                canvas.toBlob(async (blob) => {
                    if (blob) await uploadPhoto(blob);
                    snapBtn.disabled = false;
                }, 'image/jpeg', 0.87);
                return;

            } catch (e) {
                console.warn("Hi-res поток недоступен, снимаем из текущего:", e);
            }

            // --- Метод 3: последний резерв — текущий видеопоток как есть ---
            const ctx = canvas.getContext('2d');
            const w = video.videoWidth  || 1280;
            const h = video.videoHeight || 720;
            canvas.width = w; canvas.height = h;
            if (currentFacingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, w, h);
            if (currentFacingMode === 'user') ctx.setTransform(1, 0, 0, 1, 0, 0);

            statusDiv.textContent = `Снимок ${w}×${h} — отправляем...`;
            canvas.toBlob(async (blob) => {
                if (blob) await uploadPhoto(blob);
                snapBtn.disabled = false;
            }, 'image/jpeg', 0.87);
        });

        // 3. Отправка на сервер
        async function uploadPhoto(photoBlob) {
            const fileSizeMB = (photoBlob.size / (1024 * 1024)).toFixed(2);
            statusDiv.textContent = `Отправка фото в облако... (${fileSizeMB} МБ)`;

            try {
                const response = await fetch('https://hook.eu1.make.com/usmx9e6xjjoo1d4t8zk5c685qyw9duv9', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/octet-stream'
                    },
                    body: photoBlob 
                });

                if (response.ok) {
                    statusDiv.textContent = `Успешно загружено (${fileSizeMB} МБ) в папку Wedding!`;
                } else {
                    statusDiv.textContent = `Ошибка сервера. Статус: ${response.status}`;
                }
            } catch (error) {
                console.error("Ошибка сети:", error);
                statusDiv.textContent = "Ошибка сети. Проверьте соединение.";
            }
        }
    </script>
</body>
</html>
