<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотогалерея Мероприятия</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #007aff; color: white; }
        #snap-btn { background-color: #ff3b30; color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #a1a1a6; text-align: center; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>Мгновенное фото Мероприятия</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Включить камеру</button>
        <button id="snap-btn">Сделать снимок</button>
    </div>

    <div id="status">Нажмите кнопку для запуска камеры</div>
    <canvas id="canvas"></canvas>

    <script>
        const video    = document.getElementById('video');
        const canvas   = document.getElementById('canvas');
        const startBtn = document.getElementById('start-btn');
        const snapBtn  = document.getElementById('snap-btn');
        const statusDiv = document.getElementById('status');

        // 1. Запуск камеры
        startBtn.addEventListener('click', async () => {
            statusDiv.textContent = "Запрос доступа к камере...";

            const constraints = {
                video: {
                    facingMode: 'environment',
                    width:  { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                startBtn.style.display = 'none';
                snapBtn.style.display  = 'inline-block';
                statusDiv.textContent  = "Камера включена. Можно снимать!";
            } catch (err) {
                console.warn("Full HD недоступно, пробуем запасной вариант:", err);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' },
                        audio: false
                    });
                    video.srcObject = stream;
                    startBtn.style.display = 'none';
                    snapBtn.style.display  = 'inline-block';
                    statusDiv.textContent  = "Камера включена (стандартное разрешение).";
                } catch (err2) {
                    console.error("Ошибка доступа к камере:", err2);
                    statusDiv.textContent = "Не удалось открыть камеру. Проверьте разрешения браузера.";
                }
            }
        }); // ← закрываем startBtn listener

        // 2. Создание снимка
        snapBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');

            const realWidth  = video.videoWidth;
            const realHeight = video.videoHeight;
            canvas.width  = realWidth  > 0 ? realWidth  : 1920;
            canvas.height = realHeight > 0 ? realHeight : 1080;

            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                if (blob) uploadPhoto(blob);
            }, 'image/jpeg', 0.95);
        });

        // 3. Отправка на сервер
        async function uploadPhoto(photoBlob) {
    const fileSizeMB = (photoBlob.size / (1024 * 1024)).toFixed(2);
    statusDiv.textContent = `Отправка фото в облако... (${fileSizeMB} МБ)`;

    try {
        // Отправляем БЕЗ FormData — просто чистый blob (поток байт)
        const response = await fetch('https://hook.eu1.make.com/usmx9e6xjjoo1d4t8zk5c685qyw9duv9', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/octet-stream' // Говорим Make, что это чистый файл
            },
            body: photoBlob 
        });

        if (response.ok) {
            statusDiv.textContent = `Успешно загружено (${fileSizeMB} МБ) в папку Wedding!`;
        } else {
            statusDiv.textContent = `Ошибка сервера. Статус: ${response.status}`;
        }
    } catch (error) {
        console.error("Ошибка сети:", error);
                statusDiv.textContent = "Ошибка сети. Проверьте соединение.";
            }
        }
    </script>
</body>
</html>
