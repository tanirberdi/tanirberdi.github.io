<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотогалерея Мероприятия</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Чтобы кнопки красиво переносились на узких экранах */
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #007aff; color: white; }
        #snap-btn { background-color: #ff3b30; color: white; display: none; }
        #switch-btn { background-color: #34c759; color: white; display: none; } /* Зеленая кнопка смены камеры */
        #status { margin-top: 15px; font-size: 14px; color: #a1a1a6; text-align: center; }
        canvas { display: none; }
        
        .btn-gallery {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 25px auto 10px auto;
            padding: 12px 20px;
            background-color: #ff5722;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }
        .btn-gallery:hover {
            background-color: #e64a19;
        }
    </style>
</head>
<body>

    <h1>Мгновенное фото Мероприятия</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Включить камеру</button>
        <button id="snap-btn">Сделать снимок</button>
        <button id="switch-btn">🔄 Сменить камеру</button> </div>

    <div id="status">Нажмите кнопку для запуска камеры</div>
    
    <a href="https://disk.yandex.kz/d/PVRy896ITbtFCA" target="_blank" id="galleryBtn" class="btn-gallery">
        📸 Посмотреть все фото (Галерея)
    </a>

    <canvas id="canvas"></canvas>

    <script>
        const video     = document.getElementById('video');
        const canvas    = document.getElementById('canvas');
        const startBtn  = document.getElementById('start-btn');
        const snapBtn   = document.getElementById('snap-btn');
        const switchBtn = document.getElementById('switch-btn');
        const statusDiv = document.getElementById('status');

        let currentStream = null;
        let currentFacingMode = 'environment'; // По умолчанию задняя камера ('environment'). Фронтальная — 'user'

        // Функция остановки текущих стримов кары (нужна при переключении)
        function stopCurrentStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        // Функция запуска камеры
        async function initCamera() {
            stopCurrentStream();
            statusDiv.textContent = "Запрос доступа к камере...";

            const constraints = {
                video: {
                    facingMode: currentFacingMode,
                    width:  { ideal: 3400 },
                    height: { ideal: 2560 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                startBtn.style.display = 'none';
                snapBtn.style.style.display  = 'inline-block';
                switchBtn.style.display = 'inline-block'; // Показываем кнопку смены камеры
                statusDiv.textContent  = `Камера включена (${currentFacingMode === 'environment' ? 'основная' : 'фронтальная'}). можно снимать!`;
            } catch (err) {
                console.warn("Высокое разрешение недоступно, пробуем запасной вариант:", err);
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: currentFacingMode },
                        audio: false
                    });
                    video.srcObject = currentStream;
                    startBtn.style.display = 'none';
                    snapBtn.style.display  = 'inline-block';
                    switchBtn.style.display = 'inline-block';
                    statusDiv.textContent  = "Камера включена (стандартное разрешение).";
                } catch (err2) {
                    console.error("Ошибка доступа к камере:", err2);
                    statusDiv.textContent = "Не удалось открыть камеру. Проверьте разрешения браузера.";
                }
            }
        }

        // 1. Нажатие кнопки включения
        startBtn.addEventListener('click', initCamera);

        // КНОПКА СМЕНЫ КАМЕРЫ: меняет режим и перезапускает камеру
        switchBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            initCamera();
        });

        // 2. Создание снимка
        snapBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');

            const realWidth  = video.videoWidth;
            const realHeight = video.videoHeight;
            canvas.width  = realWidth  > 0 ? realWidth  : 3400;
            canvas.height = realHeight > 0 ? realHeight : 2560;

            // Если камера фронтальная, можно отзеркалить холст, чтобы фото не было перевернутым
            if (currentFacingMode === 'user') {
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
            }

            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Сбрасываем трансформацию холста обратно, если зеркалили
            if (currentFacingMode === 'user') {
                context.setTransform(1, 0, 0, 1, 0, 0);
            }

            canvas.toBlob((blob) => {
                if (blob) uploadPhoto(blob);
            }, 'image/jpeg', 0.87);
        });

        // 3. Отправка на сервер
        async function uploadPhoto(photoBlob) {
            const fileSizeMB = (photoBlob.size / (1024 * 1024)).toFixed(2);
            statusDiv.textContent = `Отправка фото в облако... (${fileSizeMB} МБ)`;

            try {
                const response = await fetch('https://hook.eu1.make.com/usmx9e6xjjoo1d4t8zk5c685qyw9duv9', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/octet-stream'
                    },
                    body: photoBlob 
                });

                if (response.ok) {
                    statusDiv.textContent = `Успешно загружено (${fileSizeMB} МБ) в папку Wedding!`;
                } else {
                    statusDiv.textContent = `Ошибка сервера. Статус: ${response.status}`;
                }
            } catch (error) {
                console.error("Ошибка сети:", error);
                statusDiv.textContent = "Ошибка сети. Проверьте соединение.";
            }
        }
    </script>
</body>
</html>
