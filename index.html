<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотогалерея Мероприятия</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        button:active {
            transform: scale(0.95);
        }
        #start-btn {
            background-color: #007aff;
            color: white;
        }
        #snap-btn {
            background-color: #ff3b30;
            color: white;
            display: none; /* Появляется только после включения камеры */
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #a1a1a6;
            text-align: center;
        }
        /* Скрытый холст для обработки снимка */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Мгновенное фото Мероприятия</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Включить камеру</button>
        <button id="snap-btn">Сделать снимок</button>
    </div>

    <div id="status">Нажмите кнопку для запуска камеры</div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('start-btn');
        const snapBtn = document.getElementById('snap-btn');
        const statusDiv = document.getElementById('status');

        // 1. Запуск камеры смартфона (задней по умолчанию)
        startBtn.addEventListener('click', async () => {
            statusDiv.textContent = "Запрос доступа к камере...";
            try {
                // Настройки для камеры: требуем заднюю камеру и высокое разрешение
const constraints = {
    video: {
        // 'environment' принудительно включает заднюю камеру (для гостей самое то)
        facingMode: 'environment', 
        
        // Задаем идеальное разрешение (Full HD)
        width: { ideal: 1920 },
        height: { ideal: 1080 }
    },
    audio: false // звук нам не нужен
};

// Запускаем камеру с новыми настройками
navigator.mediaDevices.getUserMedia(constraints)
    .then((stream) => {
        video.srcObject = stream;
    })
    .catch((err) => {
        console.error("Ошибка доступа к камере: ", err);
        
        // Запасной вариант, если телефон почему-то отклонил Full HD (например, старый телефон)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then((stream) => { video.srcObject = stream; });
    });

        // 2. Создание снимка по клику
        snapBtn.addEventListener('click', () => {
    const context = canvas.getContext('2d');
    
    // Получаем реальное разрешение видеопотока из камеры
    const realWidth = video.videoWidth;
    const realHeight = video.videoHeight;

    // Если камера еще не вернула размеры, используем стандартные высокие параметры
    canvas.width = realWidth > 0 ? realWidth : 1920;
    canvas.height = realHeight > 0 ? realHeight : 1080;
    
    // Зеркально разворачиваем холст перед отрисовкой (если у вас селфи-камера отзеркалена)
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Конвертируем в JPEG с максимальным качеством 0.95 (1.0 делать не стоит, оно просто раздувает вес без улучшения)
    canvas.toBlob((blob) => {
        if (blob) {
            uploadPhoto(blob);
        }
    }, 'image/jpeg', 0.95); 
});

        // 3. Функция отправки фотографии в облако (на сервер)
        async function uploadPhoto(photoBlob) {
            statusDiv.textContent = "Отправка фото в облако...";
            
            // Создаем форму для отправки файла
            const formData = new FormData();
            formData.append('photo', photoBlob, `photo_${Date.now()}.jpg`);
            // Переводим байты в Мегабайты и округляем до 2 знаков после запятой
                const fileSizeMB = (photoBlob.size / (1024 * 1024)).toFixed(2);
                statusDiv.textContent = `Отправка фото в облако... (${fileSizeMB} МБ)`;

            try {
                // ВАЖНО: Замените URL ниже на адрес вашего бэкенда или облачного хранилища
                const response = await fetch('https://hook.eu1.make.com/usmx9e6xjjoo1d4t8zk5c685qyw9duv9', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusDiv.textContent = "Успешно загружено! Сделайте еще фото.";
                } else {
                    statusDiv.textContent = "Ошибка при загрузке на сервер.";
                }
            } catch (error) {
                console.error("Ошибка сети:", error);
                // Для демонстрации (если сервера нет), покажем что скрипт отработал локально:
                statusDiv.textContent = "Локальный снимок сделан! (Для реальной загрузки нужен настроенный серверный URL)";
            }
        }
    </script>
</body>
</html>
